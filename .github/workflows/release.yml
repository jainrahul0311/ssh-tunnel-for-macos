name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XCodeGen
        run: brew install xcodegen

      - name: Point auto-update to this fork
        run: sed -i '' "s|TypoStudio/ssh-tunnel-for-macos|${{ github.repository }}|g" SSHTunnel/Services/UpdateService.swift

      - name: Build
        run: xcodegen generate && xcodebuild -project *.xcodeproj -scheme SSHTunnel -configuration Release build

      - name: Create DMG
        run: |
          APP_PATH="$(find ~/Library/Developer/Xcode/DerivedData/SSHTunnel-*/Build/Products/Release/SSHTunnel.app -maxdepth 0)"
          VERSION="${GITHUB_REF_NAME#v}"
          DMG_PATH="SSHTunnel-${VERSION}.dmg"
          TMP_DIR="$(mktemp -d)"
          cp -R "$APP_PATH" "$TMP_DIR/"
          ln -s /Applications "$TMP_DIR/Applications"
          hdiutil create -volname "SSHTunnel" -srcfolder "$TMP_DIR" -ov -format UDZO "$DMG_PATH"
          rm -rf "$TMP_DIR"
          echo "DMG_PATH=$DMG_PATH" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG_PATH }}
          generate_release_notes: true
